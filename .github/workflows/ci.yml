name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: "pip"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || echo "No requirements.txt found, ignoring"
        # We also need to install the dev dependencies for tests
        pip install pytest pytest-mock pytest-cov ruff pandas psycopg2-binary python-dotenv requests requests-mock
        
    - name: Lint with Ruff
      run: |
        ruff check .
        ruff format --check .
        
    - name: Test with pytest
      env:
        DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
      run: |
        pytest tests/ -v --cov=etl
