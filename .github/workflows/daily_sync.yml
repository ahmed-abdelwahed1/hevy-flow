name: Daily Hevy Sync

on:
  workflow_dispatch:        # triggered by Supabase pg_cron (21:00 UTC / 11 PM Cairo) + manual

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas psycopg2-binary python-dotenv

    - name: Run incremental sync
      env:
        HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python main.py --mode incremental
