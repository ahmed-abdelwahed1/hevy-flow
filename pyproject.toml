[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [
    ".git",
    ".ruff_cache",
    "__pycache__",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "C4",  # flake8-comprehensions
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501", # line too long, handled by ruff format
    "C408", # Plotly uses dict() kwargs extensively, ignoring rewrite to literal
]

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q --cov=etl"
pythonpath = [
  ".",
]
testpaths = [
    "tests",
]
