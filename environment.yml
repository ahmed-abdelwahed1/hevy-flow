name: hevy-flow
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pandas=2.2.*
  - psycopg2=2.9.*
  - python-dotenv=1.1.*
  - requests>=2.31
  - pip
  - pip:
      - supabase==2.*
      - streamlit==1.45.*
      - plotly==6.*
      - pytest==8.*
      - pytest-mock==3.*
      - pytest-cov==5.*
      - ruff==0.4.*
      - kaleido==0.2.*
      - fpdf2==2.*
